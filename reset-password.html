<script>
    // ========== CONFIGURAÇÃO ==========
    const API_URL = 'https://selomivplay.vercel.app/api/backend';
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbwgjor-tLLzVrnJGNHOifL1O2sRBhysKJ3IbVJy_AHgtNqjk-6hazH8xuO6OaDXF_s/exec';
    
    const urlParams = new URLSearchParams(window.location.search);
    const token = urlParams.get('token');
    
    // Validar token
    if (token) {
        if (token.length < 10) {
            showMessage('Token inválido', 'error');
            setTimeout(() => {
                window.location.href = '/reset-password.html';
            }, 2000);
        } else {
            verifyToken();
        }
    }
    
    function showLoading(show) {
        document.getElementById('loading').style.display = show ? 'block' : 'none';
    }
    
    async function requestReset() {
        const email = document.getElementById('emailField').value.trim();
        
        if (!email) {
            showMessage('Digite seu email', 'error');
            return;
        }
        
        if (!email.includes('@') || !email.includes('.')) {
            showMessage('Digite um email válido', 'error');
            return;
        }
        
        const btn = document.getElementById('requestBtn');
        btn.disabled = true;
        btn.innerHTML = '<i class="bi bi-arrow-clockwise spin"></i> Enviando...';
        
        try {
            // Tentar com fetch primeiro (Vercel)
            const response = await fetch(`${API_URL}?action=request_password_reset&email=${encodeURIComponent(email)}`, {
                method: 'GET',
                headers: { 'Accept': 'application/json' }
            });
            
            if (response.ok) {
                const result = await response.json();
                console.log('Resposta:', result);
                
                if (result.success) {
                    document.getElementById('step1').style.display = 'none';
                    document.getElementById('step2').style.display = 'block';
                    
                    if (result.dev_link) {
                        showMessage('🔧 MODO DEV - Link: ' + result.dev_link, 'info');
                    }
                } else {
                    showMessage(result.message || 'Erro ao solicitar recuperação', 'error');
                }
            } else {
                throw new Error(`HTTP error! status: ${response.status}`);
            }
            
        } catch (error) {
            console.error('Erro no fetch, tentando JSONP:', error);
            
            // Fallback para JSONP
            const callbackName = 'jsonp_callback_' + Date.now();
            
            const script = document.createElement('script');
            script.src = `${GAS_URL}?action=request_password_reset&email=${encodeURIComponent(email)}&callback=${callbackName}`;
            
            window[callbackName] = function(result) {
                document.body.removeChild(script);
                delete window[callbackName];
                clearTimeout(timeout);
                
                if (result.success) {
                    document.getElementById('step1').style.display = 'none';
                    document.getElementById('step2').style.display = 'block';
                    
                    if (result.dev_link) {
                        showMessage('🔧 MODO DEV - Link: ' + result.dev_link, 'info');
                    }
                } else {
                    showMessage(result.message || 'Erro ao solicitar recuperação', 'error');
                }
            };
            
            document.body.appendChild(script);
            
            const timeout = setTimeout(() => {
                if (window[callbackName]) {
                    window[callbackName] = function() {};
                    delete window[callbackName];
                    showMessage('Tempo limite excedido', 'error');
                }
            }, 10000);
            
        } finally {
            btn.disabled = false;
            btn.innerHTML = '<i class="bi bi-send me-2"></i> Enviar link';
        }
    }
    
    async function verifyToken() {
        showLoading(true);
        
        try {
            const response = await fetch(`${API_URL}?action=verify_reset_token&token=${encodeURIComponent(token)}`, {
                method: 'GET',
                headers: { 'Accept': 'application/json' }
            });
            
            if (response.ok) {
                const result = await response.json();
                console.log('Verificação:', result);
                
                if (result.success) {
                    document.getElementById('step1').style.display = 'none';
                    document.getElementById('step3').style.display = 'block';
                } else {
                    showMessage(result.message || 'Token inválido ou expirado', 'error');
                    setTimeout(() => {
                        window.location.href = '/reset-password.html';
                    }, 2000);
                }
            } else {
                throw new Error(`HTTP error! status: ${response.status}`);
            }
            
        } catch (error) {
            console.error('Erro no fetch, tentando JSONP:', error);
            
            // Fallback JSONP
            const callbackName = 'jsonp_verify_' + Date.now();
            
            const script = document.createElement('script');
            script.src = `${GAS_URL}?action=verify_reset_token&token=${token}&callback=${callbackName}`;
            
            window[callbackName] = function(result) {
                document.body.removeChild(script);
                delete window[callbackName];
                clearTimeout(timeout);
                
                if (result.success) {
                    document.getElementById('step1').style.display = 'none';
                    document.getElementById('step3').style.display = 'block';
                } else {
                    showMessage(result.message || 'Token inválido ou expirado', 'error');
                    setTimeout(() => {
                        window.location.href = '/reset-password.html';
                    }, 2000);
                }
            };
            
            document.body.appendChild(script);
            
            const timeout = setTimeout(() => {
                if (window[callbackName]) {
                    window[callbackName] = function() {};
                    delete window[callbackName];
                    showMessage('Tempo limite excedido', 'error');
                }
            }, 10000);
            
        } finally {
            showLoading(false);
        }
    }
    
    async function resetPassword() {
        const newPassword = document.getElementById('newPasswordField').value;
        const confirmPassword = document.getElementById('confirmPasswordField').value;
        
        if (!newPassword || !confirmPassword) {
            showMessage('Preencha todos os campos', 'error');
            return;
        }
        
        if (newPassword.length < 6) {
            showMessage('A senha deve ter no mínimo 6 caracteres', 'error');
            return;
        }
        
        if (newPassword !== confirmPassword) {
            showMessage('As senhas não coincidem', 'error');
            return;
        }
        
        const btn = document.getElementById('resetBtn');
        btn.disabled = true;
        btn.innerHTML = '<i class="bi bi-arrow-clockwise spin"></i> Processando...';
        
        try {
            const response = await fetch(`${API_URL}?action=reset_password&token=${encodeURIComponent(token)}&new_password=${encodeURIComponent(newPassword)}&confirm_password=${encodeURIComponent(confirmPassword)}`, {
                method: 'GET',
                headers: { 'Accept': 'application/json' }
            });
            
            if (response.ok) {
                const result = await response.json();
                console.log('Reset:', result);
                
                if (result.success) {
                    document.getElementById('step3').style.display = 'none';
                    document.getElementById('step4').style.display = 'block';
                } else {
                    showMessage(result.message || 'Erro ao redefinir senha', 'error');
                }
            } else {
                throw new Error(`HTTP error! status: ${response.status}`);
            }
            
        } catch (error) {
            console.error('Erro no fetch, tentando JSONP:', error);
            
            // Fallback JSONP
            const callbackName = 'jsonp_reset_' + Date.now();
            
            const script = document.createElement('script');
            script.src = `${GAS_URL}?action=reset_password&token=${token}&new_password=${encodeURIComponent(newPassword)}&confirm_password=${encodeURIComponent(confirmPassword)}&callback=${callbackName}`;
            
            window[callbackName] = function(result) {
                document.body.removeChild(script);
                delete window[callbackName];
                clearTimeout(timeout);
                
                if (result.success) {
                    document.getElementById('step3').style.display = 'none';
                    document.getElementById('step4').style.display = 'block';
                } else {
                    showMessage(result.message || 'Erro ao redefinir senha', 'error');
                }
            };
            
            document.body.appendChild(script);
            
            const timeout = setTimeout(() => {
                if (window[callbackName]) {
                    window[callbackName] = function() {};
                    delete window[callbackName];
                    showMessage('Tempo limite excedido', 'error');
                }
            }, 10000);
            
        } finally {
            btn.disabled = false;
            btn.innerHTML = '<i class="bi bi-check-circle me-2"></i> Redefinir senha';
        }
    }
    
    function resendEmail() {
        document.getElementById('step2').style.display = 'none';
        document.getElementById('step1').style.display = 'block';
    }
    
    function showMessage(message, type) {
        // Remove alertas antigos
        document.querySelectorAll('.alert-dynamic').forEach(el => el.remove());
        
        const alertDiv = document.createElement('div');
        alertDiv.className = `alert alert-dynamic alert-${type === 'error' ? 'danger' : (type === 'info' ? 'info' : 'success')} bg-dark border-${type === 'error' ? 'danger' : (type === 'info' ? 'info' : 'success')} mb-3`;
        
        let icon = 'info-circle';
        if (type === 'error') icon = 'exclamation-circle';
        if (type === 'success') icon = 'check-circle';
        
        alertDiv.innerHTML = `<i class="bi bi-${icon} me-2"></i>${message}`;
        
        const card = document.querySelector('.recovery-card');
        card.insertBefore(alertDiv, card.firstChild);
        
        setTimeout(() => alertDiv.remove(), 5000);
    }
</script>
