<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SELO MIV — Login / Investimentos Musicais</title>
  <style>
    body{font-family:Arial,Helvetica,sans-serif;background:#0e0e11;color:#eaeaf0;margin:0}
    header{padding:16px 20px;background:#141420;border-bottom:1px solid #1f1f33}
    h1{margin:0;font-size:20px}
    main{padding:20px;max-width:980px;margin:0 auto}
    .card{background:#141420;border:1px solid #1f1f33;border-radius:8px;padding:16px;margin-bottom:16px}
    .row{display:flex;gap:12px;flex-wrap:wrap}
    .col{flex:1 1 240px}
    label{display:block;font-size:12px;margin-bottom:6px;color:#bdbde6}
    input,select,button{width:100%;padding:10px;border-radius:6px;border:1px solid #2a2a55;background:#0e0e11;color:#fff}
    button{cursor:pointer;background:#5b5bf0;border:none}
    button.secondary{background:#2a2a55}
    button.danger{background:#a33}
    .muted{color:#9aa}
    .msg{margin-top:8px;font-size:13px}
    .ok{color:#6ef06e}
    .err{color:#ff7b7b}
    table{width:100%;border-collapse:collapse;margin-top:8px}
    th,td{border-bottom:1px solid #1f1f33;padding:8px;text-align:left;font-size:13px}
    th{color:#bdbde6}
    .top{display:flex;justify-content:space-between;align-items:center;gap:10px}
    .hide{display:none}
  </style>
</head>
<body>
<header>
  <div class="top">
    <h1>SELO MIV</h1>
    <div id="userBox" class="muted"></div>
  </div>
</header>

<main>
  <!-- AUTH -->
  <div id="auth" class="card">
    <h3>Cadastro</h3>
    <div class="row">
      <div class="col"><label>Nome</label><input id="r_nome"></div>
      <div class="col"><label>Email</label><input id="r_email"></div>
      <div class="col"><label>Senha</label><input id="r_pass" type="password"></div>
      <div class="col"><label>Tipo</label>
        <select id="r_tipo"><option value="ouvinte">Ouvinte</option><option value="artista">Artista</option></select>
      </div>
    </div>
    <button onclick="register()">Cadastrar</button>
    <div id="r_msg" class="msg"></div>

    <hr style="border-color:#1f1f33;margin:16px 0">

    <h3>Login</h3>
    <div class="row">
      <div class="col"><label>Email</label><input id="l_email"></div>
      <div class="col"><label>Senha</label><input id="l_pass" type="password"></div>
    </div>
    <button onclick="login()">Entrar</button>
    <div id="l_msg" class="msg"></div>
  </div>

  <!-- APP -->
  <div id="app" class="hide">
    <div class="card">
      <div class="row">
        <div class="col"><strong>Saldo:</strong> R$ <span id="saldo">0.00</span></div>
        <div class="col"><button class="secondary" onclick="logout()">Sair</button></div>
      </div>
    </div>

    <div class="card">
      <h3>Músicas</h3>
      <table>
        <thead><tr><th>Nome</th><th>Ações Disp.</th><th>Preço</th><th>Qtd</th><th></th></tr></thead>
        <tbody id="musicas"></tbody>
      </table>
      <div id="buy_msg" class="msg"></div>
    </div>
  </div>
</main>

<script>
// ===== CONFIG =====
const API_URL = 'COLE_AQUI_A_URL_DO_SEU_APPS_SCRIPT';

// ===== STATE =====
let session = JSON.parse(localStorage.getItem('miv_session') || 'null');

// ===== INIT =====
window.onload = () => {
  if (session && session.user?.id) {
    showApp();
    loadSaldo();
    loadMusicas();
  }
};

// ===== HELPERS =====
function qs(id){return document.getElementById(id)}
function msg(el, text, ok=true){el.className='msg '+(ok?'ok':'err'); el.innerText=text}
async function api(body){
  const res = await fetch(API_URL, {method:'POST', body: JSON.stringify(body)});
  return res.json();
}

// ===== AUTH =====
async function register(){
  const data = {
    action:'register',
    nome: qs('r_nome').value,
    email: qs('r_email').value,
    password: qs('r_pass').value,
    tipo: qs('r_tipo').value
  };
  const r = await api(data);
  if(r.success) msg(qs('r_msg'), r.message || 'Cadastrado');
  else msg(qs('r_msg'), r.error, false);
}

async function login(){
  const data = {action:'login', email: qs('l_email').value, password: qs('l_pass').value};
  const r = await api(data);
  if(!r.success){ msg(qs('l_msg'), r.error, false); return; }
  session = {user: r.user};
  localStorage.setItem('miv_session', JSON.stringify(session));
  showApp();
  loadSaldo();
  loadMusicas();
}

function logout(){ localStorage.removeItem('miv_session'); location.reload(); }

function showApp(){
  qs('auth').classList.add('hide');
  qs('app').classList.remove('hide');
  qs('userBox').innerText = session.user.nome + ' ('+session.user.tipo+')';
}

// ===== DATA =====
async function loadSaldo(){
  const r = await api({action:'getSaldo', userId: session.user.id});
  if(r.success) qs('saldo').innerText = (r.saldo||0).toFixed(2);
}

async function loadMusicas(){
  const r = await api({action:'getMusicas'});
  if(!r.success) return;
  const tb = qs('musicas'); tb.innerHTML='';
  r.musicas.forEach(m=>{
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td>${m.nome}</td>
      <td>${m.acoesDisponiveis}</td>
      <td>R$ ${Number(m.precoAcao).toFixed(2)}</td>
      <td><input id="q_${m.id}" type="number" min="1" style="width:70px"></td>
      <td><button onclick="buy('${m.id}', ${m.precoAcao})">Comprar</button></td>`;
    tb.appendChild(tr);
  });
}

async function buy(musicaId, preco){
  const qtd = Number(qs('q_'+musicaId).value);
  if(!qtd||qtd<=0){ msg(qs('buy_msg'),'Quantidade inválida',false); return; }
  const r = await api({action:'buy', userId: session.user.id, musicaId, quantidade:qtd});
  if(!r.success){ msg(qs('buy_msg'), r.error, false); return; }
  msg(qs('buy_msg'), r.message);
  loadSaldo(); loadMusicas();
}
</script>
</body>
</html>
