<body>

    <!-- Todo o HTML da página continua exatamente igual até o final do body -->

    <!-- JavaScript – AQUI ESTÁ A PARTE ATUALIZADA -->
    <script>
        // ========== CONFIGURAÇÃO ==========
        const CONFIG = {
            API_URL: 'https://script.google.com/macros/s/AKfycby786DuRj4q2rsG-PpHKQsZbTbbTNGLR6OtkllAnWQ0hstX7_dlNMJ-ARcQdIclA3Bv/exec'
        };

        // ========== ESTADO GLOBAL (atualizado com controle do player) ==========
        const state = {
            currentUser: null,
            currentToken: null,
            userBalance: 0,
            portfolioValue: 0,
            playlist: [],
            currentTrackIndex: -1,
            youtubePlayer: null,
            isPlaying: false,
            isPlayerExpanded: false,
            currentInvestTrack: null,
            shuffle: false,
            repeat: false,
            volume: 70,               // volume inicial mais razoável
            progressInterval: null,
            isApiReady: false,        // novo: controla se API do YT carregou
            apiReadyPromise: null     // novo: promise para esperar API
        };

        // ========== CARREGA API DO YOUTUBE UMA ÚNICA VEZ ==========
        function loadYouTubeApi() {
            if (state.apiReadyPromise) return state.apiReadyPromise;

            state.apiReadyPromise = new Promise((resolve) => {
                if (typeof YT !== 'undefined' && typeof YT.Player !== 'undefined') {
                    state.isApiReady = true;
                    resolve();
                    return;
                }

                window.onYouTubeIframeAPIReady = function () {
                    state.isApiReady = true;
                    console.log("YouTube API pronta!");
                    resolve();
                };
            });

            return state.apiReadyPromise;
        }

        // ========== CRIA O PLAYER APENAS UMA VEZ ==========
        function criarPlayerYouTube() {
            if (state.youtubePlayer) return; // já criado, não recria

            const container = document.getElementById('youtubePlayer');
            if (!container) {
                console.log("Elemento youtubePlayer não encontrado");
                return;
            }

            loadYouTubeApi().then(() => {
                state.youtubePlayer = new YT.Player('youtubePlayer', {
                    height: '100%',
                    width: '100%',
                    playerVars: {
                        autoplay: 0,
                        controls: 1,
                        rel: 0,
                        modestbranding: 1,
                        fs: 1,
                        playsinline: 1
                    },
                    events: {
                        'onReady': onPlayerReady,
                        'onStateChange': onPlayerStateChange,
                        'onError': onPlayerError
                    }
                });
            }).catch(() => {
                showToast("Não conseguiu carregar o player do YouTube", "error");
            });
        }

        function onPlayerReady(event) {
            console.log("Player pronto!");
            event.target.setVolume(state.volume);
        }

        function onPlayerStateChange(event) {
            if (event.data === YT.PlayerState.PLAYING) {
                state.isPlaying = true;
                document.getElementById('playButton').innerHTML = '<i class="bi bi-pause-circle-fill"></i>';
                startProgressTracker();
            } else if (event.data === YT.PlayerState.PAUSED || event.data === YT.PlayerState.ENDED) {
                state.isPlaying = false;
                document.getElementById('playButton').innerHTML = '<i class="bi bi-play-circle-fill"></i>';
                stopProgressTracker();
            }

            if (event.data === YT.PlayerState.ENDED) {
                if (state.repeat) {
                    event.target.seekTo(0);
                    event.target.playVideo();
                } else {
                    playNext();
                }
            }
        }

        function onPlayerError(event) {
            let msg = "Erro ao tocar vídeo.";
            if (event.data === 100) msg = "Vídeo não encontrado.";
            if (event.data === 101 || event.data === 150) msg = "Vídeo não permite incorporação.";
            showToast(msg, "error");
        }

        // ========== CARREGA VÍDEO (sem recriar player) ==========
        function loadYouTubeVideo(urlYouTube) {
            if (!state.youtubePlayer || !state.isApiReady) {
                showToast("Aguarde o player carregar...", "warning");
                return;
            }

            const videoId = extrairIdYouTube(urlYouTube);
            if (!videoId) {
                showToast("Link do YouTube inválido", "error");
                return;
            }

            state.youtubePlayer.cueVideoById(videoId);
            setTimeout(() => state.youtubePlayer.pauseVideo(), 400);
        }

        function extrairIdYouTube(url) {
            if (!url) return null;
            const regex = /(?:youtube\.com\/watch\?v=|youtu\.be\/)([^&\n?#]+)/;
            const match = url.match(regex);
            return match ? match[1] : null;
        }

        // ========== PLAY / PAUSE ==========
        function togglePlay() {
            if (!state.youtubePlayer || !state.isApiReady) return;
            if (state.isPlaying) {
                state.youtubePlayer.pauseVideo();
            } else {
                state.youtubePlayer.playVideo();
            }
        }

        // ========== PLAY TRACK ==========
        function playTrack(index) {
            if (index < 0 || index >= state.playlist.length) return;
            state.currentTrackIndex = index;
            const track = state.playlist[index];

            document.getElementById('playerTitle').textContent = track.TITULO || 'Sem título';
            document.getElementById('playerArtist').textContent = track.ARTISTA || 'Artista';
            document.getElementById('playerPrice').textContent = formatCurrency(track.VALOR_ACAO || 0);
            document.getElementById('playerAlbumArt').src = track.LINK_CAPA || 'https://via.placeholder.com/60x60/111418/00ff88?text=MIV';

            document.getElementById('playerBar').style.display = 'block';

            if (track.LINK_YOUTUBE) {
                loadYouTubeVideo(track.LINK_YOUTUBE);
            } else {
                showToast("Música sem vídeo no YouTube", "warning");
            }
        }

        // ========== PROGRESSO ==========
        function startProgressTracker() {
            stopProgressTracker();
            state.progressInterval = setInterval(updateProgress, 1000);
        }

        function stopProgressTracker() {
            if (state.progressInterval) clearInterval(state.progressInterval);
        }

        function updateProgress() {
            if (!state.youtubePlayer) return;
            try {
                const current = state.youtubePlayer.getCurrentTime() || 0;
                const duration = state.youtubePlayer.getDuration() || 0;
                if (duration > 0) {
                    document.getElementById('musicProgress').style.width = (current / duration * 100) + '%';
                    document.getElementById('currentTime').textContent = formatTime(current);
                    document.getElementById('durationTime').textContent = formatTime(duration);
                }
            } catch (e) {}
        }

        function formatTime(seconds) {
            const m = Math.floor(seconds / 60);
            const s = Math.floor(seconds % 60);
            return m + ':' + (s < 10 ? '0' : '') + s;
        }

        // ========== INICIALIZAÇÃO ==========
        document.addEventListener('DOMContentLoaded', function() {
            loadYouTubeApi();
            criarPlayerYouTube();
            // ... suas outras inicializações ...
        });

        // ========== FUNÇÕES QUE JÁ EXISTIAM (mantidas) ==========
        // Coloque aqui todas as outras funções do seu código original:
        // showLoading, hideLoading, showToast, handleLogin, handleRegister,
        // loadMarketplace, renderMarketplace, openInvestModal, etc.

        // Exemplo: função formatCurrency que já existia
        function formatCurrency(value) {
            return 'R$ ' + Number(value).toFixed(2).replace('.', ',');
        }

        // ... continue colando o resto do seu JavaScript original aqui ...
    </script>
</body>
