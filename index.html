<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MIV Music Pro | Fintech Musical</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <script src="https://www.youtube.com/iframe_api"></script>
    <style>
        :root { --neon-green: #00ff88; --miv-blue: #0072ff; --bg-dark: #07090c; }
        body { font-family: sans-serif; background: var(--bg-dark); color: white; margin: 0; padding-bottom: 110px; }
        .player-bar { position: fixed; bottom: 0; width: 100%; background: #111; padding: 15px; border-top: 2px solid var(--neon-green); display:none; }
        .card-musica { background: #1a1a1a; padding: 15px; margin: 10px; border-radius: 10px; border: 1px solid #333; }
        .btn-miv { background: var(--neon-green); color: black; font-weight: bold; border-radius: 20px; border: none; padding: 5px 20px; }
    </style>
</head>
<body>

    <div class="container mt-5">
        <h2 class="text-center" style="color: var(--neon-green)">MERCADO DE AÇÕES MUSICAIS</h2>
        <div id="lista-musicas" class="row"></div>
    </div>

    <div id="player-bar" class="player-bar">
        <div class="d-flex align-items-center justify-content-between">
            <div class="d-flex align-items-center">
                <img id="track-img" src="" width="50" class="me-3">
                <div>
                    <div id="track-title" class="fw-bold"></div>
                    <small id="track-isrc" class="text-muted"></small>
                </div>
            </div>
            <div id="yt-placeholder" style="display:none"></div>
            <button class="btn btn-outline-light" onclick="togglePlay()"><i class="bi bi-play-fill"></i></button>
        </div>
    </div>

    <script>
        // COLE SUA URL DO GOOGLE ABAIXO:
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxEfqdRWQhqyu1PXkl6o7exumu7Gz6QoldMpGwRJGUfyOQlVBuM5iWy_8FOPTq18kD5/exec"; 
        
        let player, playlist = [], currentIndex = 0, minerado = false;
        let currentUser = { id: "OUVINTE_TESTE" }; // Em produção, pegue do login

        function onYouTubeIframeAPIReady() {
            player = new YT.Player('yt-placeholder', {
                height: '0', width: '0',
                events: { 'onStateChange': onPlayerStateChange }
            });
            carregarMusicas();
        }

        async function carregarMusicas() {
            const res = await fetch(`${SCRIPT_URL}?acao=get_musicas`);
            playlist = await res.json();
            const container = document.getElementById('lista-musicas');
            container.innerHTML = playlist.map((m, i) => `
                <div class="col-md-4">
                    <div class="card-musica text-center">
                        <img src="${m.LINK_CAPA}" width="100%">
                        <h5 class="mt-2">${m.TITULO}</h5>
                        <p>Cota: R$ ${m["VALOR AÇÃO"]}</p>
                        <button class="btn-miv" onclick="tocarMusica(${i})">OUVIR E MINERAR</button>
                    </div>
                </div>
            `).join('');
        }

        function tocarMusica(index) {
            currentIndex = index;
            minerado = false;
            const track = playlist[index];
            document.getElementById('player-bar').style.display = 'block';
            document.getElementById('track-title').innerText = track.TITULO;
            document.getElementById('track-img').src = track.LINK_CAPA;
            document.getElementById('track-isrc').innerText = "ISRC: " + track.ISRC;
            player.loadVideoById(track.ytId);
        }

        function onPlayerStateChange(event) {
            if (event.data === YT.PlayerState.ENDED && !minerado) {
                registrarGanho();
            }
        }

        async function registrarGanho() {
            const track = playlist[currentIndex];
            await fetch(SCRIPT_URL, {
                method: 'POST',
                body: JSON.stringify({
                    acao: 'registrar_mineracao',
                    userID: currentUser.id,
                    musicaID: track.ID,
                    isrc: track.ISRC
                })
            });
            minerado = true;
            alert("Parabéns! R$ 0,0001 foram creditados no seu saldo pelo ISRC: " + track.ISRC);
        }

        function togglePlay() {
            const state = player.getPlayerState();
            state === 1 ? player.pauseVideo() : player.playVideo();
        }
    </script>
</body>
</html>f
