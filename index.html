<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SELO MIV | Fintech Musical</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700&display=swap" rel="stylesheet">
    <script src="https://www.youtube.com/iframe_api"></script>

    <style>
        /* Seu CSS original mantido integralmente – não alterei nada aqui */
        :root {
            --neon-green: #00ff88;
            --miv-blue: #0072ff;
            --bg-dark: #07090c;
            --bg-card: #111418;
            --border: #1e2329;
            --text-light: #f8f9fa;
            --text-muted: #6c757d;
        }
        /* ... todo o resto do seu CSS continua exatamente igual ... */
    </style>
</head>
<body>

    <!-- Seu HTML completo mantido (loading, auth, main app, player bar, modais, etc.) -->
    <!-- ... cole aqui todo o seu HTML do <body> original ... -->

    <!-- JavaScript – versão atualizada e corrigida -->
    <script>
        // CONFIG
        const CONFIG = {
            API_URL: 'https://script.google.com/macros/s/AKfycbxiQYgqr7fBru6fIPFIat_ke99aMdGZt13OhNo4gYwU3TQ4JwGea-geTS7-KeV1zyA4/exec'
        };

        // ESTADO GLOBAL
        const state = {
            currentUser: null,
            currentToken: null,
            userBalance: 0,
            portfolioValue: 0,
            playlist: [],
            currentTrackIndex: -1,
            youtubePlayer: null,
            isPlaying: false,
            isPlayerExpanded: false,
            currentInvestTrack: null,
            shuffle: false,
            repeat: false,
            volume: 70,
            progressInterval: null,
            playerReady: false
        };

        // UTILIDADES (com hideLoading reforçado)
        function showLoading(message = 'Carregando...') {
            document.getElementById('loadingScreen').style.display = 'flex';
            document.getElementById('loadingMessage').textContent = message;
        }

        function hideLoading() {
            document.getElementById('loadingScreen').style.display = 'none';
        }

        function showToast(message, type = 'success') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.innerHTML = `
                <i class="bi ${type === 'success' ? 'bi-check-circle' : 'bi-exclamation-circle'} toast-icon"></i>
                <div class="toast-message">${message}</div>
            `;
            container.appendChild(toast);
            setTimeout(() => toast.classList.add('show'), 10);
            setTimeout(() => {
                toast.classList.remove('show');
                setTimeout(() => container.removeChild(toast), 300);
            }, 3000);
        }

        // AUTENTICAÇÃO (com timeout e hideLoading garantido)
        async function handleLogin() {
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value.trim();
            if (!email || !password) {
                showToast('Preencha todos os campos', 'error');
                return;
            }

            showLoading('Autenticando...');
            try {
                const controller = new AbortController();
                const timeout = setTimeout(() => controller.abort(), 10000);

                const response = await fetch(`${CONFIG.API_URL}?acao=login&email=${encodeURIComponent(email)}&pass=${encodeURIComponent(password)}`, {
                    signal: controller.signal
                });

                clearTimeout(timeout);

                const data = await response.json();
                if (data.success) {
                    state.currentUser = data.data;
                    state.currentToken = data.data.token;
                    localStorage.setItem('miv_user', JSON.stringify(state.currentUser));
                    localStorage.setItem('miv_token', state.currentToken);
                    showToast('Login realizado!', 'success');
                    initializeApp();
                } else {
                    showToast(data.message || 'Credenciais inválidas', 'error');
                }
            } catch (error) {
                console.error('Erro login:', error);
                showToast('Erro ao conectar. Verifique internet ou tente novamente.', 'error');
            } finally {
                hideLoading();
            }
        }

        // PLAYER DO YOUTUBE – CORRIGIDO
        function initYouTubePlayer() {
            if (state.youtubePlayer) return;

            window.onYouTubeIframeAPIReady = function() {
                state.playerReady = true;
                console.log('YouTube API carregada com sucesso');
                createYouTubePlayer();
            };

            // Se API já estiver carregada
            if (typeof YT !== 'undefined' && YT.Player) {
                state.playerReady = true;
                createYouTubePlayer();
            }
        }

        function createYouTubePlayer() {
            state.youtubePlayer = new YT.Player('youtubePlayer', {
                height: '100%',
                width: '100%',
                playerVars: {
                    autoplay: 0,
                    controls: 1,
                    rel: 0,
                    modestbranding: 1,
                    fs: 1,
                    playsinline: 1
                },
                events: {
                    onReady: (event) => {
                        console.log('Player pronto');
                        state.playerReady = true;
                        event.target.setVolume(state.volume);
                    },
                    onStateChange: onPlayerStateChange,
                    onError: (event) => {
                        console.error('Erro YouTube:', event.data);
                        showToast('Erro no vídeo do YouTube', 'error');
                    }
                }
            });
        }

        function onPlayerStateChange(event) {
            if (event.data === YT.PlayerState.PLAYING) {
                state.isPlaying = true;
                document.getElementById('playButton').innerHTML = '<i class="bi bi-pause-circle-fill"></i>';
                startProgressTracker();
            } else if (event.data === YT.PlayerState.PAUSED || event.data === YT.PlayerState.ENDED) {
                state.isPlaying = false;
                document.getElementById('playButton').innerHTML = '<i class="bi bi-play-circle-fill"></i>';
                stopProgressTracker();
            }

            if (event.data === YT.PlayerState.ENDED) {
                if (state.repeat) event.target.playVideo();
                else playNext();
            }
        }

        function loadYouTubeVideo(url) {
            if (!state.playerReady || !state.youtubePlayer) {
                showToast('Player carregando... aguarde', 'warning');
                return;
            }

            const videoId = url.match(/(?:youtu\.be\/|youtube\.com\/(?:embed\/|v\/|watch\?v=|watch\?.+&v=))([^&\n?#]+)/)?.[1];
            if (!videoId) {
                showToast('Link do YouTube inválido', 'error');
                return;
            }

            state.youtubePlayer.cueVideoById(videoId);
            setTimeout(() => state.youtubePlayer.pauseVideo(), 500);
        }

        function togglePlay() {
            if (!state.playerReady || !state.youtubePlayer) {
                showToast('Aguarde o player carregar', 'warning');
                return;
            }

            if (state.isPlaying) {
                state.youtubePlayer.pauseVideo();
            } else {
                state.youtubePlayer.playVideo().catch(e => {
                    console.log('Erro play:', e);
                    showToast('Reprodução bloqueada. Clique novamente.', 'warning');
                });
            }
        }

        // Inicialização
        function initializeApp() {
            hideLoading(); // garante que loading suma mesmo se der erro
            document.getElementById('authScreen').style.display = 'none';
            document.getElementById('mainApp').style.display = 'block';
            updateUserInterface();
            loadUserData();
            loadMarketplace();
            initYouTubePlayer();
        }

        // ... mantenha aqui todas as outras funções do seu código original ...
        // (loadUserData, loadMarketplace, renderMarketplace, playTrack, etc.)

        // Adicione isso no final para forçar hideLoading se algo travar
        window.addEventListener('load', () => {
            setTimeout(hideLoading, 5000); // segurança extra: esconde loading após 5s
        });
    </script>
</body>
</html>
