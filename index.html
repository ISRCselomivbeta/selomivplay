<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SELO MIV v4.1.0</title>
<style>
  body { font-family: Arial, sans-serif; background:#111418; color:#00ff88; margin:0; padding:0;}
  header { background:#111418; padding:10px; text-align:center; font-size:24px; font-weight:bold;}
  #player-container { display:flex; justify-content:center; margin:20px;}
  #player { width:100%; max-width:560px; height:315px; }
  .dashboard { text-align:center; margin:20px;}
  button { background:#00ff88; color:#111418; border:none; padding:10px 20px; cursor:pointer; font-weight:bold; margin:5px;}
  button:hover { opacity:0.8; }
</style>
</head>
<body>

<header>SELO MIV v4.1.0</header>

<div id="player-container">
  <div id="player"></div>
</div>

<div class="dashboard">
  <div>Saldo atual: <span id="saldo">0</span> MIV</div>
  <button onclick="exportarPlanilha()">Exportar Planilha</button>
</div>

<script>
// ====== CONFIGURAÇÕES ======
const SPREADSHEET_ID = '1CwF9hf-lsjYkol-V7r3WOT5ld3dQFqKRTQ8nHcV45Wo';
const VIDEO_ID = 'SEU_VIDEO_YOUTUBE_ID';
let saldo = 0;

// ====== CARREGAR PLAYER YOUTUBE ======
let tag = document.createElement('script');
tag.src = "https://www.youtube.com/iframe_api";
document.body.appendChild(tag);

let player;
function onYouTubeIframeAPIReady() {
  player = new YT.Player('player', {
    height: '315',
    width: '560',
    videoId: VIDEO_ID,
    events: {
      'onStateChange': onPlayerStateChange
    },
    playerVars: {
      'controls': 1,
      'rel': 0,
      'modestbranding': 1
    }
  });
}

// ====== DETECTAR FIM DO VÍDEO ======
function onPlayerStateChange(event) {
  if(event.data === YT.PlayerState.ENDED) {
    contabilizarPlay();
  }
}

// ====== CONTABILIZAR PLAY ======
async function contabilizarPlay() {
  try {
    const response = await fetch('https://script.google.com/macros/s/AKfycbzF31lrSN6b2V6AT38VU2qzsRhOO8yiXIkdhknMqm6GVD5v4UgTmwDceKT5MqMe8nA/exec', {
      method:'POST',
      body: JSON.stringify({action:'registrar_play', videoId: VIDEO_ID}),
      headers:{'Content-Type':'application/json'}
    });
    const data = await response.json();
    saldo = data.saldo;
    document.getElementById('saldo').innerText = saldo.toFixed(2);
    mostrarToast("Play registrado! Saldo atualizado.");
  } catch(err) {
    console.error("Erro ao registrar play:", err);
    mostrarToast("Erro ao registrar play.");
  }
}

// ====== EXPORTAR PLANILHA ======
function exportarPlanilha() {
  window.open(`https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/export?format=xlsx`);
}

// ====== TOAST NOTIFICAÇÃO ======
function mostrarToast(msg) {
  let toast = document.createElement('div');
  toast.innerText = msg;
  toast.style.position = 'fixed';
  toast.style.bottom = '20px';
  toast.style.left = '50%';
  toast.style.transform = 'translateX(-50%)';
  toast.style.background = '#00ff88';
  toast.style.color = '#111418';
  toast.style.padding = '10px 20px';
  toast.style.borderRadius = '5px';
  toast.style.fontWeight = 'bold';
  toast.style.zIndex = 9999;
  document.body.appendChild(toast);
  setTimeout(()=>{toast.remove()},3000);
}
</script>

</body>
</html>
