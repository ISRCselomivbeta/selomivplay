<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>SELO MIV | Fintech Musical</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#00ff88" />

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

  <style>
    body {
      background:#07090c;
      color:#fff;
      font-family: system-ui, -apple-system, BlinkMacSystemFont;
    }
    .card {
      background:#111418;
      border:1px solid #1e2329;
    }
    .btn-miv {
      background:#00ff88;
      color:#000;
      font-weight:700;
    }
    .btn-miv:hover {
      background:#00cc6a;
    }
  </style>
</head>
<body>

<!-- AUTH -->
<div id="authScreen" class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-4">

      <!-- LOGIN -->
      <div id="loginForm" class="card p-4">
        <h4 class="text-center mb-3">Login</h4>
        <input id="loginEmail" class="form-control mb-2" placeholder="Email">
        <input id="loginPassword" type="password" class="form-control mb-3" placeholder="Senha">
        <button class="btn btn-miv w-100" onclick="handleLogin()">Entrar</button>
        <p class="text-center mt-3">
          <a href="#" onclick="showRegister()">Criar conta</a>
        </p>
      </div>

      <!-- REGISTER -->
      <div id="registerForm" class="card p-4 d-none">
        <h4 class="text-center mb-3">Cadastro</h4>
        <input id="regName" class="form-control mb-2" placeholder="Nome">
        <input id="regEmail" class="form-control mb-2" placeholder="Email">
        <input id="regPassword" type="password" class="form-control mb-2" placeholder="Senha">
        <select id="regType" class="form-control mb-3">
          <option value="">Tipo</option>
          <option value="ouvinte">Ouvinte</option>
          <option value="artista">Artista</option>
        </select>
        <button class="btn btn-miv w-100" onclick="handleRegister()">Cadastrar</button>
        <p class="text-center mt-3">
          <a href="#" onclick="showLogin()">Já tenho conta</a>
        </p>
      </div>

    </div>
  </div>
</div>

<!-- APP -->
<div id="mainApp" class="container py-4 d-none">

  <div class="d-flex justify-content-between align-items-center mb-4">
    <h3>Marketplace</h3>
    <div>
      Saldo: <strong id="currentBalance">R$ 0,00</strong>
      <button class="btn btn-sm btn-danger ms-2" onclick="logout()">Sair</button>
    </div>
  </div>

  <!-- MUSIC GRID -->
  <div id="marketplaceContent" class="row g-3"></div>

</div>

<!-- PLAYER (SEM PLACEHOLDER EXTERNO) -->
<img
  id="playerAlbumArt"
  style="display:none"
  src="data:image/svg+xml;utf8,
  <svg xmlns='http://www.w3.org/2000/svg' width='60' height='60'>
    <rect width='100%' height='100%' fill='%23111418'/>
    <text x='50%' y='50%'
          dominant-baseline='middle'
          text-anchor='middle'
          fill='%2300ff88'
          font-size='14'>MIV</text>
  </svg>"
>

<script>
/* ================= CONFIG ================= */
const API_URL = 'https://script.google.com/macros/s/AKfycbwoo1T0Cgw6TVqCyCY7CniAsg0pD3guOAVs5BNutvbvqQaYOMlAfCO6HLw2REil4UY/exec';

/* ================= STATE ================= */
let currentUser = null;

/* ================= INIT ================= */
window.onload = () => {
  const saved = localStorage.getItem('user');
  if (saved) {
    currentUser = JSON.parse(saved);
    showApp();
    loadSaldo();
    loadMusicas();
  }
};

/* ================= AUTH ================= */
function showRegister() {
  loginForm.classList.add('d-none');
  registerForm.classList.remove('d-none');
}

function showLogin() {
  registerForm.classList.add('d-none');
  loginForm.classList.remove('d-none');
}

async function handleRegister() {
  const nome = regName.value;
  const email = regEmail.value;
  const password = regPassword.value;
  const tipo = regType.value;

  const res = await fetch(API_URL, {
    method:'POST',
    body: JSON.stringify({ action:'register', nome, email, password, tipo })
  });
  const data = await res.json();

  alert(data.message || data.error);
  if (data.success) showLogin();
}

async function handleLogin() {
  const email = loginEmail.value;
  const password = loginPassword.value;

  const res = await fetch(API_URL, {
    method:'POST',
    body: JSON.stringify({ action:'login', email, password })
  });
  const data = await res.json();

  if (!data.success) return alert(data.error);

  currentUser = data.user;
  localStorage.setItem('user', JSON.stringify(currentUser));
  showApp();
  loadSaldo();
  loadMusicas();
}

function logout() {
  localStorage.clear();
  location.reload();
}

function showApp() {
  authScreen.classList.add('d-none');
  mainApp.classList.remove('d-none');
}

/* ================= DATA ================= */
async function loadSaldo() {
  const res = await fetch(API_URL, {
    method:'POST',
    body: JSON.stringify({ action:'getSaldo', userId: currentUser.id })
  });
  const data = await res.json();
  if (data.success) {
    currentBalance.innerText = 'R$ ' + data.saldo.toFixed(2);
  }
}

async function loadMusicas() {
  const res = await fetch(API_URL, {
    method:'POST',
    body: JSON.stringify({ action:'getMusicas' })
  });
  const data = await res.json();

  marketplaceContent.innerHTML = '';
  if (!data.musicas) return;

  data.musicas.forEach(m => {
    marketplaceContent.innerHTML += `
      <div class="col-md-4">
        <div class="card p-3">
          <h5>${m.nome}</h5>
          <small class="text-muted">Ações: ${m.acoesDisponiveis}</small>
          <p>R$ ${m.precoAcao.toFixed(2)}</p>
          <button class="btn btn-miv btn-sm" onclick="buy('${m.id}')">Comprar 1</button>
        </div>
      </div>
    `;
  });
}

async function buy(musicaId) {
  const res = await fetch(API_URL, {
    method:'POST',
    body: JSON.stringify({
      action:'buy',
      userId: currentUser.id,
      musicaId,
      quantidade:1
    })
  });
  const data = await res.json();
  alert(data.message || data.error);
  loadSaldo();
  loadMusicas();
}
</script>

</body>
</html>
