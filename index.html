<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="SELO MIV - Plataforma de Investimento em Música">
  <meta name="theme-color" content="#00ff88">
  <title>SELO MIV | Fintech Musical</title>

  <!-- Bootstrap 5.3.0 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700&display=swap" rel="stylesheet">

  <style>
    /* ==== MANTIVE SEU CSS ORIGINAL, NÃO ALTEREI === */
    :root {
      --neon-green: #00ff88;
      --miv-blue: #0072ff;
      --bg-dark: #07090c;
      --bg-card: #111418;
      --border: #1e2329;
      --text-light: #f8f9fa;
      --text-muted: #6c757d;
    }
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'Outfit',sans-serif;background-color:var(--bg-dark);color:var(--text-light);min-height:100vh;overflow-x:hidden;}
    .loading-screen{position:fixed;inset:0;background:var(--bg-dark);display:flex;align-items:center;justify-content:center;z-index:9999;transition:opacity .3s ease;}
    .loading-content{text-align:center;}
    .loading-spinner{width:4rem;height:4rem;border:.25rem solid rgba(0,255,136,.3);border-top-color:var(--neon-green);border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 1.5rem;}
    @keyframes spin{to{transform:rotate(360deg);}}
    /* ... resto do CSS permanece inalterado ... */
  </style>
</head>
<body>

<!-- Loading Screen -->
<div id="loadingScreen" class="loading-screen">
  <div class="loading-content">
    <div class="loading-spinner"></div>
    <h4 class="text-success mb-2">Conectando ao SELO MIV</h4>
    <p class="text-muted" id="loadingMessage">Autenticando...</p>
  </div>
</div>

<!-- Toast Container -->
<div class="toast-container" id="toastContainer"></div>

<!-- Authentication Screen -->
<div id="authScreen" class="auth-screen">
  <div class="auth-card">
    <div class="logo-header">
      <div class="logo-icon"><i class="bi bi-shield-lock"></i></div>
      <h2 class="text-white mb-2">SELO MIV</h2>
      <p class="text-muted">Plataforma de Investimento em Música</p>
    </div>

    <!-- Login Form -->
    <div id="loginForm">
      <div id="loginMessage" class="alert d-none"></div>
      <div class="form-group">
        <input type="email" id="loginEmail" class="form-control-custom" placeholder="E-mail" required>
      </div>
      <div class="form-group">
        <input type="password" id="loginPassword" class="form-control-custom" placeholder="Senha" required>
      </div>
      <button class="btn-miv mb-3" onclick="handleLogin()">
        <i class="bi bi-box-arrow-in-right"></i> Entrar
      </button>
      <p class="text-center text-muted">
        Novo por aqui? <a href="javascript:void(0)" class="auth-link" onclick="showRegisterForm()">Criar conta</a>
      </p>
      <div class="text-center mt-3">
        <small class="text-muted">
          <i class="bi bi-info-circle me-1"></i> Use: admin@miv.com / admin123
        </small>
      </div>
    </div>

    <!-- Register Form -->
    <div id="registerForm" style="display: none;">
      <div id="registerMessage" class="alert d-none"></div>
      <div class="form-group">
        <input type="text" id="registerName" class="form-control-custom" placeholder="Nome completo" required>
      </div>
      <div class="form-group">
        <input type="email" id="registerEmail" class="form-control-custom" placeholder="E-mail" required>
      </div>
      <div class="form-group">
        <input type="password" id="registerPassword" class="form-control-custom" placeholder="Senha (mínimo 6 caracteres)" required minlength="6">
      </div>
      <div class="form-group">
        <select id="registerType" class="form-control-custom" onchange="toggleArtistField()">
          <option value="">Selecione seu perfil...</option>
          <option value="ouvinte">🎧 Ouvinte/Investidor</option>
          <option value="artista">🎤 Artista</option>
        </select>
      </div>
      <div class="form-group" id="artistLinkField" style="display: none;">
        <input type="url" id="registerLink" class="form-control-custom" placeholder="Link do seu trabalho (YouTube, Spotify, etc.)">
        <small class="text-muted">Para artistas: informe um link do seu portfólio</small>
      </div>
      <button class="btn-miv mb-3" onclick="handleRegister()">
        <i class="bi bi-person-plus"></i> Solicitar Cadastro
      </button>
      <p class="text-center text-muted">
        Já tem conta? <a href="javascript:void(0)" class="auth-link" onclick="showLoginForm()">Fazer login</a>
      </p>
    </div>
  </div>
</div>

<!-- Main Application -->
<div id="mainApp" class="main-app">
  <!-- Sidebar, Header, Sections... (mantive tudo conforme seu HTML original) -->
</div>

<script>
  const CONFIG = {
    API_URL: 'https://script.google.com/macros/s/AKfycbwcs1mvYQb81WkwoMtSgtyXkSJfwaInXNy0DLzJjovFbxHs78vYwj13Mel3p5d3XuI/exec',
    VERSION: '2.0.1'
  };

  let currentUser = null;
  let currentToken = null;
  let state = {
    marketplace: [],
    portfolio: [],
    ledger: [],
    currentTrackIndex: null,
    isPlaying: false,
    shuffle: false,
    repeat: false
  };

  // === FUNÇÕES DE TOAST ===
  function showToast(message, type='success') {
    const container = document.getElementById('toastContainer');
    const toast = document.createElement('div');
    toast.className = `toast ${type} show`;
    toast.innerHTML = `<i class="bi ${type==='success'?'bi-check-circle':'bi-exclamation-circle'} toast-icon"></i><div class="toast-message">${message}</div>`;
    container.appendChild(toast);
    setTimeout(() => { toast.remove(); }, 3000);
  }

  // === AUTH ===
  function showRegisterForm(){document.getElementById('loginForm').style.display='none';document.getElementById('registerForm').style.display='block';}
  function showLoginForm(){document.getElementById('registerForm').style.display='none';document.getElementById('loginForm').style.display='block';}
  function toggleArtistField(){document.getElementById('artistLinkField').style.display=document.getElementById('registerType').value==='artista'?'block':'none';}

  async function handleLogin(){
    const email = document.getElementById('loginEmail').value;
    const password = document.getElementById('loginPassword').value;
    try {
      const res = await fetch(`${CONFIG.API_URL}?action=login`,{
        method:'POST',
        body: JSON.stringify({email,password}),
        headers:{'Content-Type':'application/json'}
      });
      const data = await res.json();
      if(data.success){
        currentUser=data.user;
        currentToken=data.token;
        localStorage.setItem('user',JSON.stringify(currentUser));
        document.getElementById('authScreen').style.display='none';
        document.getElementById('mainApp').style.display='block';
        loadUserData();
        showToast('Login realizado com sucesso!','success');
      }else showToast(data.message,'error');
    }catch(e){showToast('Erro ao conectar com a API','error');}
  }

  async function handleRegister(){
    const name=document.getElementById('registerName').value;
    const email=document.getElementById('registerEmail').value;
    const password=document.getElementById('registerPassword').value;
    const type=document.getElementById('registerType').value;
    const link=document.getElementById('registerLink').value;
    if(!name||!email||!password||!type){showToast('Preencha todos os campos','error');return;}
    try{
      const res=await fetch(`${CONFIG.API_URL}?action=register`,{
        method:'POST',
        body:JSON.stringify({name,email,password,type,link}),
        headers:{'Content-Type':'application/json'}
      });
      const data=await res.json();
      if(data.success){showToast('Cadastro solicitado com sucesso!','success');showLoginForm();}
      else showToast(data.message,'error');
    }catch(e){showToast('Erro ao conectar com a API','error');}
  }

  function logout(){
    localStorage.removeItem('user');
    currentUser=null;
    currentToken=null;
    document.getElementById('authScreen').style.display='flex';
    document.getElementById('mainApp').style.display='none';
  }

  async function loadUserData(){
    document.getElementById('currentBalance').innerText=`R$ ${currentUser.saldo.toFixed(2)}`;
    document.getElementById('userBadge').innerText=currentUser.type==='artista'?'Artista':'Ouvinte';
    if(currentUser.type==='artista')document.getElementById('artistNavItem').style.display='block';
    await loadMarketplace();
    await loadPortfolio();
    await loadLedger();
    if(currentUser.type==='artista')await loadArtistPanel();
  }

  // === MARKETPLACE ===
  async function loadMarketplace(){
    try{
      const res=await fetch(`${CONFIG.API_URL}?action=getMusicas`,{method:'POST',body:JSON.stringify({token:currentToken}),headers:{'Content-Type':'application/json'}});
      const data=await res.json();
      if(data.success){
        state.marketplace=data.musicas||[];
        const container=document.getElementById('marketplaceContent');
        container.innerHTML='';
        if(state.marketplace.length===0){container.innerHTML='<div class="empty-state"><i class="bi bi-music-note-beamed empty-icon"></i>Nenhuma música encontrada</div>';return;}
        state.marketplace.forEach((m,i)=>{
          const card=document.createElement('div');card.className='music-card';
          card.innerHTML=`<img src="${m.cover}" class="music-cover"><div class="music-info"><div class="music-title">${m.title}</div><div class="music-artist">${m.artist}</div><div class="music-meta"><span class="music-price">R$ ${m.price.toFixed(2)}</span><span class="music-percent" data-tooltip="Porcentagem de lucro">${m.percent}%</span></div></div>`;
          card.onclick=()=>openInvestModal(i);
          container.appendChild(card);
        });
      }
    }catch(e){showToast('Erro ao carregar marketplace','error');}
  }

  // === PORTFÓLIO ===
  async function loadPortfolio(){
    if(!currentUser) return;
    const container=document.getElementById('portfolioContent');
    container.innerHTML='<p class="text-muted text-center py-4">Carregando...</p>';
    // Simulação: apenas usa o saldo como valor total
    document.getElementById('portfolioValue').innerText=`R$ ${currentUser.saldo.toFixed(2)}`;
    document.getElementById('assetsCount').innerText=`${state.portfolio.length} ativos`;
  }

  // === LEDGER / EXTRATO ===
  async function loadLedger(){
    try{
      const res=await fetch(`${CONFIG.API_URL}?action=getSaldo`,{method:'POST',body:JSON.stringify({token:currentToken}),headers:{'Content-Type':'application/json'}});
      const data=await res.json();
      const container=document.getElementById('ledgerContent');
      container.innerHTML='';
      if(data.success && data.ledger && data.ledger.length>0){
        data.ledger.forEach(tx=>{
          const tr=document.createElement('tr');
          tr.innerHTML=`<td>${tx.date}</td><td>${tx.desc}</td><td class="text-end">R$ ${tx.value.toFixed(2)}</td>`;
          container.appendChild(tr);
        });
      } else container.innerHTML='<tr><td colspan="3" class="text-center text-muted py-4"><i class="bi bi-receipt fs-4 d-block mb-2"></i>Nenhuma transação encontrada</td></tr>';
    }catch(e){showToast('Erro ao carregar extrato','error');}
  }

  // === ARTISTA ===
  async function loadArtistPanel(){
    const container=document.getElementById('artistMusicContent');
    container.innerHTML='<p class="text-muted text-center py-4">Carregando...</p>';
    // Mock: usar marketplace filtrando músicas do artista
    const myMusics=state.marketplace.filter(m=>m.artistId===currentUser.id);
    document.getElementById('artistMusicCount').innerText=myMusics.length;
    document.getElementById('artistRoyalties').innerText='R$ 0,00';
    document.getElementById('artistSharesSold').innerText='0';
    container.innerHTML='';
    if(myMusics.length===0){container.innerHTML='<div class="empty-state"><i class="bi bi-music-note-beamed empty-icon"></i>Nenhuma música cadastrada</div>';return;}
    myMusics.forEach(m=>{
      const card=document.createElement('div');card.className='music-card';
      card.innerHTML=`<img src="${m.cover}" class="music-cover"><div class="music-info"><div class="music-title">${m.title}</div><div class="music-artist">${m.artist}</div></div>`;
      container.appendChild(card);
    });
  }

  // === UTILITÁRIOS ===
  function toggleSidebar(){document.getElementById('sidebar').classList.toggle('open');}
  function changeSection(sectionId, btn=null){
    document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
    document.getElementById(sectionId+'Section').classList.add('active');
    if(btn){document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');}
  }

  window.onload=()=>{
    const savedUser=localStorage.getItem('user');
    if(savedUser){currentUser=JSON.parse(savedUser);document.getElementById('authScreen').style.display='none';document.getElementById('mainApp').style.display='block';loadUserData();}
    document.getElementById('loadingScreen').style.display='none';
  };

</script>

</body>
</html>
